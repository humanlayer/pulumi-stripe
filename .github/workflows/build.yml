name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install pulumictl
        run: |
          curl -L https://github.com/pulumi/pulumictl/releases/download/v0.0.46/pulumictl-v0.0.46-linux-amd64.tar.gz | tar xz
          sudo mv pulumictl /usr/local/bin/

      - name: Tidy Go modules
        run: cd provider && go mod tidy

      - name: Generate schema
        run: make tfgen

      - name: Build provider
        run: make provider

      - name: Generate TypeScript SDK
        run: make build_nodejs

      - name: Build TypeScript SDK
        run: cd sdk/nodejs && npm install && npm run build

      - name: Type-check examples
        run: cd examples/basic-ts && npm install && npx tsc --noEmit
