name: Publish to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "sdk/nodejs/package.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(jq -r .version sdk/nodejs/package.json)" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install pulumictl
        run: |
          curl -L https://github.com/pulumi/pulumictl/releases/download/v0.0.46/pulumictl-v0.0.46-linux-amd64.tar.gz | tar xz
          sudo mv pulumictl /usr/local/bin/

      - name: Generate schema
        run: make tfgen

      - name: Build provider
        run: make provider VERSION=${{ steps.version.outputs.VERSION }}

      - name: Generate TypeScript SDK
        run: make build_nodejs

      - name: Fix SDK version
        run: |
          cd sdk/nodejs
          npm pkg set version=${{ steps.version.outputs.VERSION }}

      - name: Build TypeScript SDK
        run: cd sdk/nodejs && npm install && npm run build
        env:
          CI: true

      - name: Verify SDK contents
        run: |
          echo "Contents of sdk/nodejs/bin/:"
          ls -la sdk/nodejs/bin/
          if [ ! -f sdk/nodejs/bin/index.js ]; then
            echo "ERROR: bin/index.js not found"
            exit 1
          fi
          if [ ! -f sdk/nodejs/bin/index.d.ts ]; then
            echo "ERROR: bin/index.d.ts not found"
            exit 1
          fi

      - name: Type-check examples
        run: cd examples/basic-ts && npm install && npx tsc --noEmit
        env:
          CI: true

      - name: Publish to npm
        run: cd sdk/nodejs && npm publish --tolerate-republish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
