name: Validate npm package

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Save package.json metadata
        id: pkg
        run: |
          echo "VERSION=$(jq -r .version sdk/nodejs/package.json)" >> $GITHUB_OUTPUT
          cp sdk/nodejs/package.json /tmp/package.json.bak

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install pulumictl
        run: |
          curl -L https://github.com/pulumi/pulumictl/releases/download/v0.0.46/pulumictl-v0.0.46-linux-amd64.tar.gz | tar xz
          sudo mv pulumictl /usr/local/bin/

      - name: Generate schema
        run: make tfgen

      - name: Build provider
        run: make provider VERSION=${{ steps.pkg.outputs.VERSION }}

      - name: Generate TypeScript SDK
        run: make build_nodejs

      - name: Restore package.json metadata
        run: |
          cd sdk/nodejs
          # Preserve generated pulumi block, restore everything else from committed version
          PULUMI_BLOCK=$(jq '.pulumi' package.json)
          cp /tmp/package.json.bak package.json
          jq --argjson pulumi "$PULUMI_BLOCK" '.pulumi = $pulumi' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Build TypeScript SDK
        run: cd sdk/nodejs && npm install && npm run build
        env:
          CI: true

      - name: Verify SDK contents
        run: |
          echo "Contents of sdk/nodejs/bin/:"
          ls -la sdk/nodejs/bin/
          if [ ! -f sdk/nodejs/bin/index.js ]; then
            echo "ERROR: bin/index.js not found"
            exit 1
          fi
          if [ ! -f sdk/nodejs/bin/index.d.ts ]; then
            echo "ERROR: bin/index.d.ts not found"
            exit 1
          fi

      - name: Type-check examples
        run: cd examples/basic-ts && npm install && npx tsc --noEmit
        env:
          CI: true

      - name: Pack npm package
        run: cd sdk/nodejs && npm pack --dry-run
